<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Satura{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename=active_palette.mark_file) }}" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Libre+Baskerville:wght@700&family=Lora:wght@400;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
    {% block head %}{% endblock %}
</head>

<body data-active-palette="{{ active_palette.name }}" data-palette-warm="{{ active_palette.warm }}"
    data-palette-cool="{{ active_palette.cool }}" data-ui-warm="{{ active_palette.ui_warm }}"
    data-ui-warm-bright="{{ active_palette.ui_warm_bright }}" data-ui-cool="{{ active_palette.ui_cool }}"
    data-ui-cool-bright="{{ active_palette.ui_cool_bright }}">

    <!-- ── Nav ─────────────────────────────────────────────────────────────────── -->
    <nav class="site-nav">
        <div class="nav-inner container">
            <a href="/" class="brand">
                <img src="{{ url_for('static', filename=active_palette.mark_file) }}" alt="Satura Logo"
                    class="brand-mark" width="28" height="28">
                <span class="brand-wordmark">Satura</span>
            </a>
            <div class="nav-links">
                <a href="/new-game" class="nav-link">New game</a>
                <a href="/my-games" class="nav-link">My games</a>
                <a href="/how-to-play" class="nav-link">How to play</a>
            </div>
            <div class="nav-actions">
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('main.settings_profile') }}" class="nav-profile-btn"
                    aria-label="Open profile settings" title="Profile settings">
                    <span class="material-symbols-outlined">account_circle</span>
                </a>
                {% else %}
                <a href="/login" class="btn btn--secondary btn--sm">Sign in</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <!-- ── Footer ──────────────────────────────────────────────────────────────── -->
    <footer class="site-footer">
        <div class="footer-inner container">
            <div class="left">
                <a href="/about">About Satura</a>
                <a href="/contact">Contact</a>
            </div>
            <div class="right">
                <a href="/legal/terms">Terms of Use</a>
                <a href="/legal/privacy">Privacy Policy</a>
                <a href="/legal/cookies">Cookie Policy</a>
            </div>
        </div>
    </footer>

    <script>
        (function () {
            'use strict';

            const root = document.documentElement;
            const body = document.body;
            const warm = body?.dataset?.paletteWarm;
            const cool = body?.dataset?.paletteCool;
            const uiWarm = body?.dataset?.uiWarm || warm;
            const uiWarmBright = body?.dataset?.uiWarmBright || uiWarm;
            const uiCool = body?.dataset?.uiCool || cool;
            const uiCoolBright = body?.dataset?.uiCoolBright || uiCool;

            if (!warm || !cool) {
                return;
            }

            function hexToRgba(hex, alpha) {
                const clean = String(hex).replace('#', '');
                if (clean.length !== 6) {
                    return 'rgba(0, 0, 0, ' + alpha + ')';
                }
                const r = parseInt(clean.slice(0, 2), 16);
                const g = parseInt(clean.slice(2, 4), 16);
                const b = parseInt(clean.slice(4, 6), 16);
                return 'rgba(' + r + ', ' + g + ', ' + b + ', ' + alpha + ')';
            }

            root.style.setProperty('--accent', uiWarm);
            root.style.setProperty('--accent-tint', hexToRgba(uiWarm, 0.10));
            root.style.setProperty('--accent-dim', hexToRgba(uiWarm, 0.65));
            root.style.setProperty('--accent-cool', uiCool);
            root.style.setProperty('--accent-cool-tint', hexToRgba(uiCool, 0.10));
            root.style.setProperty('--accent-cool-dim', hexToRgba(uiCool, 0.65));

            root.style.setProperty('--accent-bright', uiWarmBright);
            root.style.setProperty('--accent-bright-tint', hexToRgba(uiWarmBright, 0.10));
            root.style.setProperty('--accent-bright-dim', hexToRgba(uiWarmBright, 0.65));
            root.style.setProperty('--accent-cool-bright', uiCoolBright);
            root.style.setProperty('--accent-cool-bright-tint', hexToRgba(uiCoolBright, 0.10));
            root.style.setProperty('--accent-cool-bright-dim', hexToRgba(uiCoolBright, 0.65));
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
