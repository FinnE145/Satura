{% extends "base.html" %}

{% block title %}Satura — Test Bench{% endblock %}

{% block content %}
<main class="site-main" id="test-root" data-game-id="{{ game_id }}" data-player-num="{{ player_num or '' }}" data-multiplayer="{{ 'true' if multiplayer else '' }}">
    <div class="container">

        <!-- Session status bar -->
        <div class="session-bar" role="status" aria-live="polite">
            <span class="session-bar-left">
                <span class="status-dot" id="status-dot" aria-hidden="true"></span>
                <span class="session-bar-group">
                    <span class="session-bar-key">Session</span>
                    <code class="session-id" id="session-id" title="">—</code>
                </span>
            </span>

            <span class="word-bank" id="word-bank"></span>
        </div>

        <!-- Workspace: editor + board -->
        <div class="workspace">

            <!-- Editor card -->
            <div class="card editor-card">
                <div class="card-header">
                    <h2 class="card-title">Script</h2>
                    <span class="script-meta">
                        <span class="word-cost" id="word-cost"></span>
                        <span class="word-eta" id="word-eta"></span>
                    </span>
                </div>
                <textarea class="script-editor" id="script-editor" spellcheck="false" autocomplete="off"
                    autocorrect="off" autocapitalize="off" placeholder="// write your script here"
                    aria-label="Script editor"></textarea>
                <div class="card-footer">
                    <button class="btn btn--ghost" id="btn-compile" disabled>Compile</button>
                    <button class="btn btn--accent" id="btn-deploy" disabled>Deploy</button>
                </div>
            </div>

            <!-- Board card -->
            <div class="card board-card">
                <div class="card-header">
                    <h2 class="card-title">Board</h2>
                    <span class="board-legend" id="board-legend">
                        <span class="board-legend-item board-legend-item--p1" id="board-legend-p1">P1 0 (0.0%)</span>
                        <span class="board-legend-item board-legend-item--p2" id="board-legend-p2">P2 0 (0.0%)</span>
                    </span>
                </div>
                <div class="board-wrap">
                    <div class="board-grid" id="board-grid"></div>
                </div>
            </div>

        </div><!-- .workspace -->

        <!-- Game controls panel -->
        <div class="card game-controls" id="game-controls">
            <div class="game-controls-main">

                <!-- Mine side (always left) -->
                <div class="game-controls-side game-controls-side--mine" id="gc-side-mine">
                    <span class="gc-player-badge" id="gc-badge-mine"></span>
                    <span class="gc-clock" id="gc-clock-mine">--:--</span>
                    <span class="phase-pill" id="gc-phase-mine" hidden></span>
                </div>

                <!-- Buttons -->
                <div class="game-controls-btns">
                    <button type="button" class="game-controls-btn btn-warm-hover">
                        <span class="material-symbols-outlined">replay</span>
                        <span class="icon-btn-label">Replay</span>
                    </button>
                    <button type="button" class="game-controls-btn btn-cool-hover">
                        <span class="material-symbols-outlined">arrow_back</span>
                        <span class="icon-btn-label">Back</span>
                    </button>
                    <button type="button" class="game-controls-btn btn-cool-hover">
                        <span class="material-symbols-outlined">arrow_forward</span>
                        <span class="icon-btn-label">Forward</span>
                    </button>
                    <button type="button" class="game-controls-btn btn-warm-hover">
                        <span class="material-symbols-outlined">last_page</span>
                        <span class="icon-btn-label">Current</span>
                    </button>
                    <button type="button" class="game-controls-btn game-controls-btn--draw btn-warn-hover" id="btn-draw">
                        <span class="material-symbols-outlined">handshake</span>
                        <span class="icon-btn-label">Draw</span>
                    </button>
                    <button type="button" class="game-controls-btn game-controls-btn--resign btn-danger-hover" id="btn-resign">
                        <span class="material-symbols-outlined">flag</span>
                        <span class="icon-btn-label">Resign</span>
                    </button>
                </div>

                <!-- Opponent side (always right) -->
                <div class="game-controls-side game-controls-side--opp" id="gc-side-opp">
                    <span class="phase-pill" id="gc-phase-opp" hidden></span>
                    <span class="gc-clock" id="gc-clock-opp">--:--</span>
                    <span class="gc-player-badge" id="gc-badge-opp"></span>
                </div>

            </div>
            <span class="game-controls-confirm text-small-sans" id="game-controls-confirm" hidden></span>
        </div>

        <!-- Results row: diagnostics + output -->
        <div class="results-row">

            <!-- Diagnostics -->
            <div class="card result-card" id="diagnostics-card">
                <div class="card-header">
                    <h2 class="card-title">Diagnostics</h2>
                    <span class="badge" id="diag-badge" aria-live="polite"></span>
                </div>
                <div class="card-body" id="diagnostics-body">
                    <span class="empty-label">No diagnostics</span>
                </div>
            </div>

            <!-- Output -->
            <div class="card result-card" id="output-card">
                <div class="card-header">
                    <h2 class="card-title">Output</h2>
                    <span class="outcome-label" id="outcome-label"></span>
                </div>
                <div class="card-body" id="output-body">
                    <span class="empty-label">No output yet</span>
                </div>
            </div>

        </div><!-- .results-row -->

        <!-- End-of-game modal -->
        <div class="game-over-modal" id="game-over-modal" role="dialog" aria-modal="true"
            aria-labelledby="game-over-title" hidden>
            <div class="game-over-modal__backdrop" id="game-over-backdrop"></div>
            <div class="card game-over-modal__card" role="document">
                <div class="card-header">
                    <h2 class="card-title" id="game-over-title">Game Over</h2>
                </div>
                <div class="card-body game-over-modal__body">
                    <p class="game-over-modal__message text-small-sans" id="game-over-message"></p>
                </div>
                <div class="card-footer">
                    <button class="btn btn--secondary" id="game-over-dismiss">Close</button>
                </div>
            </div>
        </div>

    </div><!-- .container -->
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/test.js') }}"></script>
<script>
(function () {
    var confirm = document.getElementById('game-controls-confirm');
    var drawBtn = document.getElementById('btn-draw');
    var resignBtn = document.getElementById('btn-resign');
    var pending = null;

    function clearConfirm() {
        confirm.hidden = true;
        confirm.textContent = '';
        pending = null;
    }

    drawBtn.addEventListener('click', function () {
        if (pending === 'draw') { clearConfirm(); return; }
        pending = 'draw';
        confirm.textContent = 'Click Draw again to confirm';
        confirm.hidden = false;
    });

    resignBtn.addEventListener('click', function () {
        if (pending === 'resign') {
            clearConfirm();
            fetch(apiBase + '/resign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ player: minePlayer }),
            }).then(function () {
                if (!bankPollTimer) { startBankPoll(); }
                refreshBank();
            });
            return;
        }
        pending = 'resign';
        confirm.textContent = 'Click Resign again to confirm';
        confirm.hidden = false;
    });

    [drawBtn, resignBtn].forEach(function (btn) {
        btn.addEventListener('blur', function () {
            setTimeout(function () {
                if (!document.activeElement || (document.activeElement !== drawBtn && document.activeElement !== resignBtn)) {
                    clearConfirm();
                }
            }, 150);
        });
    });
})();
</script>
{% endblock %}
