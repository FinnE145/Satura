{% extends "settings_base.html" %}

{% block title %}Satura | About & Legal{% endblock %}

{% block settings_content %}
<article class="card settings-card">
    <header class="card-header">
        <h1 class="card-title">About</h1>
    </header>
    <div class="settings-card-body">
        <p class="heading-display">Satura</p>
        <p class="text-subtle">Version 0.0.1 Alpha</p>
    </div>
</article>

<article class="card settings-card">
    <header class="card-header">
        <h2 class="card-title">Legal</h2>
    </header>
    <div class="settings-card-body">
        <div class="settings-link-list">
            <a href="{{ url_for('main.legal_terms') }}">Terms of Use</a>
            <a href="{{ url_for('main.legal_privacy') }}">Privacy Policy</a>
            <a href="{{ url_for('main.legal_cookies') }}">Cookie Policy</a>
            <a href="/legal/contact">Legal Contact Form</a>
        </div>
    </div>
</article>
{% endblock %}
