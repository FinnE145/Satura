{% extends "settings_base.html" %}

{% block title %}Satura — Feedback{% endblock %}

{% block settings_content %}
<article class="card settings-card">
    <header class="card-header">
        <h1 class="card-title">Feedback</h1>
    </header>
    <div class="settings-card-body">
        <p class="text-subtle">Tell us what is working, what is broken, or what you want to see next.</p>
        <form class="contact-form settings-form" method="post" action="{{ url_for('main.contact') }}">
            <input type="hidden" name="form_source" value="settings-feedback">
            <div class="field">
                <label class="form-label" for="name">Name or Username</label>
                <input type="text" id="name" name="name" autocomplete="name" value="{{ current_user.username }}"
                    required>
            </div>
            <div class="field">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="email" value="{{ current_user.email or '' }}"
                    required>
            </div>
            <div class="field">
                <label class="form-label" for="message">Message</label>
                <textarea id="message" name="message" placeholder="What should we improve?" required></textarea>
            </div>
            <button type="submit" class="btn btn--accent">Send feedback</button>
        </form>
    </div>
</article>
{% endblock %}
