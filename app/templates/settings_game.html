{% extends "settings_base.html" %}

{% block title %}Satura | Game Settings{% endblock %}

{% block settings_content %}
<article class="card settings-card" id="defaults">
    <header class="card-header">
        <h1 class="card-title">Game Defaults</h1>
    </header>
    <div class="settings-card-body">
        <form method="post" class="contact-form settings-form">
            <input type="hidden" name="action" value="save_defaults">

            <div class="field">
                <label class="form-label" for="time_control">Default time control</label>
                <select id="time_control" name="time_control">
                    {% for control in time_controls %}
                    <option value="{{ control }}" {% if settings.default_time_control==control %}selected{% endif %}>
                        {% if control == 'custom' %}Custom{% else %}{{ control }} min{% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="field" id="custom-minutes-wrap" {% if settings.default_time_control !='custom' %}hidden{% endif
                %}>
                <label class="form-label" for="custom_minutes">Custom minutes</label>
                <input type="number" id="custom_minutes" name="custom_minutes" min="1" max="180"
                    value="{{ settings.custom_minutes or 10 }}" {% if settings.default_time_control !='custom'
                    %}disabled{% endif %}>
            </div>

            <div class="field">
                <label class="form-label" for="default_player">Default player</label>
                <select id="default_player" name="default_player">
                    <option value="p1" {% if settings.default_player=='p1' %}selected{% endif %}>Player 1</option>
                    <option value="p2" {% if settings.default_player=='p2' %}selected{% endif %}>Player 2</option>
                    <option value="random" {% if settings.default_player=='random' %}selected{% endif %}>Random</option>
                </select>
            </div>

            <div class="field">
                <label class="form-label" for="default_board_size">Default board size</label>
                <input type="range" id="default_board_size" class="settings-slider" name="default_board_size" min="8"
                    max="32" step="1" value="{{ settings.default_board_size }}" list="board-size-stops">
                <datalist id="board-size-stops">
                    {% for stop in board_size_stops %}
                    <option value="{{ stop }}"></option>
                    {% endfor %}
                </datalist>
                <p class="text-small-sans text-subtle">Selected: <span id="board-size-value">{{
                        settings.default_board_size }}</span></p>
            </div>

            <button type="submit" class="btn btn--accent">Save game defaults</button>
        </form>
    </div>
</article>

<article class="card settings-card" id="appearance">
    <header class="card-header">
        <h2 class="card-title">Appearance</h2>
    </header>
    <div class="settings-card-body settings-card-body--palette">
        <form method="post" class="settings-palette-form">
            <input type="hidden" name="action" value="save_palette">
            <div class="settings-palette-grid" role="radiogroup" aria-label="Palette selection">
                <label
                    class="settings-palette-card {% if settings.palette == 'solstice' %}settings-palette-card--active{% endif %}">
                    <input type="radio" name="palette" value="solstice" {% if settings.palette=='solstice' %}checked{%
                        endif %}>
                    <span>Solstice</span>
                    <img src="{{ url_for('static', filename='satura_solstice_grid.svg') }}"
                        alt="Solstice palette grid preview">
                </label>
                <label
                    class="settings-palette-card {% if settings.palette == 'fieldstone' %}settings-palette-card--active{% endif %}">
                    <input type="radio" name="palette" value="fieldstone" {% if settings.palette=='fieldstone'
                        %}checked{% endif %}>
                    <span>Fieldstone</span>
                    <img src="{{ url_for('static', filename='satura_fieldstone_grid.svg') }}"
                        alt="Fieldstone palette grid preview">
                </label>
                <label
                    class="settings-palette-card {% if settings.palette == 'levant' %}settings-palette-card--active{% endif %}">
                    <input type="radio" name="palette" value="levant" {% if settings.palette=='levant' %}checked{% endif
                        %}>
                    <span>Levant</span>
                    <img src="{{ url_for('static', filename='satura_levant_grid.svg') }}"
                        alt="Levant palette grid preview">
                </label>
                <label
                    class="settings-palette-card {% if settings.palette == 'folio' %}settings-palette-card--active{% endif %}">
                    <input type="radio" name="palette" value="folio" {% if settings.palette=='folio' %}checked{% endif
                        %}>
                    <span>Folio</span>
                    <img src="{{ url_for('static', filename='satura_folio_grid.svg') }}"
                        alt="Folio palette grid preview">
                </label>
            </div>
            <button type="submit" class="btn btn--accent">Save appearance</button>
        </form>
    </div>
</article>
{% endblock %}

{% block settings_scripts %}
<script>
    (function () {
        'use strict';

        const allowed = [8, 10, 12, 14, 16, 18, 20, 24, 28, 32];
        const slider = document.getElementById('default_board_size');
        const output = document.getElementById('board-size-value');
        const timeControl = document.getElementById('time_control');
        const customWrap = document.getElementById('custom-minutes-wrap');

        function snapBoardSize() {
            if (!slider || !output) {
                return;
            }
            const raw = Number(slider.value);
            let closest = allowed[0];
            let distance = Math.abs(raw - closest);

            allowed.forEach((value) => {
                const diff = Math.abs(raw - value);
                if (diff < distance) {
                    closest = value;
                    distance = diff;
                }
            });

            slider.value = String(closest);
            output.textContent = String(closest);
        }

        function syncCustomMinutesVisibility() {
            if (!timeControl || !customWrap) {
                return;
            }
            const isCustom = timeControl.value === 'custom';
            customWrap.hidden = !isCustom;
            const customInput = customWrap.querySelector('input');
            if (customInput) {
                customInput.disabled = !isCustom;
            }
        }

        if (slider) {
            slider.addEventListener('input', snapBoardSize);
            slider.addEventListener('change', snapBoardSize);
            snapBoardSize();
        }

        if (timeControl) {
            timeControl.addEventListener('change', syncCustomMinutesVisibility);
            syncCustomMinutesVisibility();
        }

        const paletteCards = document.querySelectorAll('.settings-palette-card');
        const paletteInputs = document.querySelectorAll('.settings-palette-card input[type="radio"]');

        function syncPaletteCards() {
            paletteCards.forEach((card) => {
                const radio = card.querySelector('input[type="radio"]');
                card.classList.toggle('settings-palette-card--active', Boolean(radio && radio.checked));
            });
        }

        paletteInputs.forEach((input) => {
            input.addEventListener('change', syncPaletteCards);
        });

        syncPaletteCards();
    })();
</script>
{% endblock %}
